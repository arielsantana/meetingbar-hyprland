# MeetingBar overlay — add to ~/.config/hypr/hyprland.conf
# Requires Hyprland 0.42+ for block syntax.
# gtk4-layer-shell handles fullscreen when installed; these rules handle
# positioning and focus on systems where layer-shell is unavailable.

windowrule {
    float       = class:(meetingbar.overlay)
    stayfocused = class:(meetingbar.overlay)
    pin         = class:(meetingbar.overlay)
}

# Make sure environment variables reach the service:
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_RUNTIME_DIR DISPLAY DBUS_SESSION_BUS_ADDRESS
